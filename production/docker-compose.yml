services:
  backend:
    image: ${HARBOR_HOST:-registry.hamdocker.ir}/${HARBOR_PROJECT:-ayousefnia}/backend:${BACKEND_TAG:-latest}
    container_name: django-backend
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    image: ${HARBOR_HOST:-registry.hamdocker.ir}/${HARBOR_PROJECT:-ayousefnia}/frontend:${FRONTEND_TAG:-latest}
    container_name: react-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-django_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-django_password}
      POSTGRES_DB: ${DB_NAME:-django_db}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"      # optional – remove if you don't need external access

  redis:
    image: redis:alpine
    container_name: redis-cache
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"      # optional

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"      # S3 API
      - "9001:9001"      # web console

volumes:
  postgres_data:
  redis_data:
  minio_data: