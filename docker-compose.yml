services:
  backend:
    build: ./backend
    container_name: django-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - /app/.venv
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - postgres
      - redis
      - minio-init

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000
    container_name: react-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_password
      POSTGRES_DB: django_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django_user -d django_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: minio-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    volumes:
      - ./backend/static/images/default_avatar.svg:/default_avatar.svg
    entrypoint: >
      /bin/sh -c "
        set -e;
        until mc alias set myminio http://minio:9000 minioadmin minioadmin; do
          echo 'Waiting for MinIO...';
          sleep 2;
        done;
        echo 'MinIO ready.';

        mc mb myminio/avatars --ignore-existing;
        echo 'Bucket avatars ready.';

        mc cp /default_avatar.svg myminio/avatars/default_avatar.svg;
        echo 'Default avatar uploaded.';

        # Use the modern 'mc anonymous' command to set public access
        mc anonymous set public myminio/avatars;
        echo 'Bucket set to public.';

        exit 0;
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data: